name: CI

# Quality gates: lint the Python, prove the package installs and imports,
# and validate the plugin + marketplace manifests.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Lint & import (Python)
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - name: Install Ruff
        run: python -m pip install --upgrade "ruff==0.15.15"
      - name: Ruff (lint)
        run: ruff check .
      - name: Byte-compile
        run: python -m py_compile src/google_workspace_mcp/*.py
      - name: Install package
        run: python -m pip install .
      - name: Import smoke test
        run: |
          python -c "from google_workspace_mcp import server, authorize, accounts, auth; import google_workspace_mcp; print('ok', google_workspace_mcp.__version__)"
          google-workspace-authorize 2>&1 | grep -q usage || true
      - name: Validate JSON manifests
        run: |
          for f in .claude-plugin/plugin.json .claude-plugin/marketplace.json accounts.example.json; do
            python3 -c "import json,sys; json.load(open(sys.argv[1])); print(sys.argv[1], 'ok')" "$f"
          done
      - name: Versions agree (plugin.json, pyproject.toml, __init__.py)
        run: |
          python3 - <<'EOF'
          import json, re, sys, tomllib
          plugin = json.load(open(".claude-plugin/plugin.json"))["version"]
          pyproject = tomllib.load(open("pyproject.toml", "rb"))["project"]["version"]
          init = re.search(r'__version__ = "([^"]+)"',
                           open("src/google_workspace_mcp/__init__.py").read()).group(1)
          print(f"plugin.json={plugin} pyproject={pyproject} __init__={init}")
          sys.exit(0 if plugin == pyproject == init else 1)
          EOF

  plugin:
    name: Validate plugin manifest
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "20"
      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code
      - name: Validate plugin
        run: claude plugin validate . --strict
